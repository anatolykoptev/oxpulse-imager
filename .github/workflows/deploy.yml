name: Deploy to wordpress.org

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to wordpress.org SVN
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-dev --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Build admin SPA
        run: npm run build

      - name: Generate .pot file
        run: npm run make-pot

      - name: Run tests (gate the deploy)
        run: |
          composer test:unit
          npm test
        env:
          WP_TESTS_DIR: ''

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1.1.7
        with:
          build-dir: '.'
          exclude-files: |
            .gitignore
            .gitattributes
            .editorconfig
            .release-please-manifest.json
            release-please-config.json
            phpunit.xml.dist
            .phpunit.result.cache
            ROADMAP.md
            CHANGELOG.md
            SECURITY.md
            README.md
          exclude-directories: |
            node_modules
            vendor
            tests
            build
            .github
            .git
          # Legitimate false positives (reviewed):
          # - ExceptionNotEscaped : exception messages are not HTML output.
          # - parse_url_parse_url : Domain/Application layer (UrlRewriter,
          #   HealthCheckService) intentionally uses PHP primitives, not WP
          #   wrappers — this layer must be WordPress-agnostic for testability.
          ignore-codes: |
            WordPress.Security.EscapeOutput.ExceptionNotEscaped
            WordPress.WP.AlternativeFunctions.parse_url_parse_url
          ignore-warnings: false

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches plugin header
        run: |
          PLUGIN_VERSION=$(grep -oP 'Version:\s+\K[\d.]+' oxpulse-imager.php)
          if [ "$PLUGIN_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.VERSION }}) does not match plugin header ($PLUGIN_VERSION)"
            exit 1
          fi
          echo "✓ Plugin header version match: $PLUGIN_VERSION"

      - name: Verify readme.txt stable tag matches
        run: |
          STABLE_TAG=$(grep -oP 'Stable tag:\s+\K[\d.]+' readme.txt)
          if [ "$STABLE_TAG" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::readme.txt stable tag ($STABLE_TAG) does not match tag version (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✓ Stable tag match: $STABLE_TAG"

      - name: Verify PHP constant matches
        run: |
          CONST_VERSION=$(grep -oP "define\('OXPULSE_IMAGER_VERSION',\s*'\K[\d.]+" oxpulse-imager.php)
          if [ "$CONST_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::OXPULSE_IMAGER_VERSION constant ($CONST_VERSION) does not match tag version (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✓ PHP constant match: $CONST_VERSION"

      # `secrets` is not available in a step-level `if:` (it rejects the
      # whole workflow), so read it via `env` into a step output here and
      # gate the SVN publish + ZIP build on that.
      - name: Detect wordpress.org SVN credentials
        id: svn
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        run: |
          if [ -n "${SVN_USERNAME}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # wordpress.org SVN publish — SKIPPED until the plugin is approved on
      # wordpress.org and the SVN_USERNAME/SVN_PASSWORD secrets are set. Until
      # then this job still runs every gate (tests, plugin-check, version
      # match), builds the distribution ZIP, and attaches it to the GitHub
      # Release. To go live on wordpress.org: get the plugin approved, add the
      # two secrets — this step then runs automatically. Set dry-run: true for
      # the very first SVN run to verify access without committing.
      - name: Deploy to SVN (wordpress.org)
        if: steps.svn.outputs.present == 'true'
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: oxpulse-imager
          VERSION: ${{ steps.version.outputs.VERSION }}

      # When SVN is skipped, build the distribution ZIP ourselves via
      # `git archive`, which honors .gitattributes export-ignore (the same file
      # the 10up action uses). Unzips to an `oxpulse-imager/` folder.
      - name: Build distribution ZIP
        if: steps.svn.outputs.present == 'false'
        run: git archive --format=zip --prefix=oxpulse-imager/ -o oxpulse-imager.zip HEAD

      - name: Attach ZIP to the GitHub Release
        run: |
          for i in 1 2 3 4 5; do
            gh release upload "${GITHUB_REF_NAME}" oxpulse-imager.zip --clobber && exit 0
            echo "release ${GITHUB_REF_NAME} not ready yet — retry $i"; sleep 10
          done
          echo "::error::could not attach ZIP to release ${GITHUB_REF_NAME}"; exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxpulse-imager-${{ steps.version.outputs.VERSION }}
          path: ${{ github.workspace }}/oxpulse-imager.zip
