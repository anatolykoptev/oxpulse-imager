name: Deploy to wordpress.org

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to wordpress.org SVN
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-dev --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Build admin SPA
        run: npm run build

      - name: Generate .pot file
        run: npm run make-pot

      - name: Run tests (gate the deploy)
        run: |
          composer test:unit
          npm test
        env:
          WP_TESTS_DIR: ''

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '.'
          exclude-files: |
            .gitignore
            .gitattributes
            .editorconfig
            .release-please-manifest.json
            release-please-config.json
            phpunit.xml.dist
            .phpunit.result.cache
            ROADMAP.md
            CHANGELOG.md
            SECURITY.md
            README.md
          exclude-directories: |
            node_modules
            vendor
            tests
            build
            .github
            .git
          # Legitimate false positives (reviewed):
          # - curl_* : WordPressPrewarmClient uses curl_multi for bounded
          #   concurrency (wp_remote_* is single-request; a 50-URL batch
          #   would take minutes sequentially). HTTP API has no multi primitive.
          # - ExceptionNotEscaped : exception messages are not HTML output.
          # - parse_url_parse_url : Domain/Application layer (UrlRewriter,
          #   HealthCheckService) intentionally uses PHP primitives, not WP
          #   wrappers — this layer must be WordPress-agnostic for testability.
          ignore-codes: |
            WordPress.WP.AlternativeFunctions.curl_curl_init
            WordPress.WP.AlternativeFunctions.curl_curl_setopt
            WordPress.WP.AlternativeFunctions.curl_curl_multi_init
            WordPress.WP.AlternativeFunctions.curl_curl_multi_add_handle
            WordPress.WP.AlternativeFunctions.curl_curl_multi_exec
            WordPress.WP.AlternativeFunctions.curl_curl_multi_select
            WordPress.WP.AlternativeFunctions.curl_curl_multi_info_read
            WordPress.WP.AlternativeFunctions.curl_curl_getinfo
            WordPress.WP.AlternativeFunctions.curl_curl_error
            WordPress.WP.AlternativeFunctions.curl_curl_multi_remove_handle
            WordPress.WP.AlternativeFunctions.curl_curl_multi_close
            WordPress.Security.EscapeOutput.ExceptionNotEscaped
            WordPress.WP.AlternativeFunctions.parse_url_parse_url
          ignore-warnings: false

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches plugin header
        run: |
          PLUGIN_VERSION=$(grep -oP 'Version:\s+\K[\d.]+' oxpulse-imager.php)
          if [ "$PLUGIN_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.VERSION }}) does not match plugin header ($PLUGIN_VERSION)"
            exit 1
          fi
          echo "✓ Plugin header version match: $PLUGIN_VERSION"

      - name: Verify readme.txt stable tag matches
        run: |
          STABLE_TAG=$(grep -oP 'Stable tag:\s+\K[\d.]+' readme.txt)
          if [ "$STABLE_TAG" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::readme.txt stable tag ($STABLE_TAG) does not match tag version (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✓ Stable tag match: $STABLE_TAG"

      - name: Verify PHP constant matches
        run: |
          CONST_VERSION=$(grep -oP "define\('OXPULSE_IMAGER_VERSION',\s*'\K[\d.]+" oxpulse-imager.php)
          if [ "$CONST_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::OXPULSE_IMAGER_VERSION constant ($CONST_VERSION) does not match tag version (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✓ PHP constant match: $CONST_VERSION"

      # For the FIRST deploy, set dry-run: true to verify SVN access
      # without committing. Remove dry-run after the first successful run.
      - name: Deploy to SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: oxpulse-imager
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: oxpulse-imager-${{ steps.version.outputs.VERSION }}
          path: ${{ github.workspace }}/oxpulse-imager.zip
