name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit ${{ matrix.php }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl
          coverage: xdebug
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run unit tests
        run: composer test:unit
        env:
          WP_TESTS_DIR: ''

      - name: Lint main plugin file
        run: php -l oxpulse-imager.php

  admin-build:
    name: Admin SPA build + JS tests
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests
        run: npm test

      - name: Build admin SPA
        run: npm run build

      - name: Verify deterministic build (rebuild → identical hashes)
        run: |
          FIRST_HASH=$(cat assets/manifest.json | sha256sum)
          npm run build
          SECOND_HASH=$(cat assets/manifest.json | sha256sum)
          if [ "$FIRST_HASH" != "$SECOND_HASH" ]; then
            echo "::error::Build is not deterministic — two consecutive builds produced different manifest.json"
            echo "First:  $FIRST_HASH"
            echo "Second: $SECOND_HASH"
            exit 1
          fi
          echo "✓ Deterministic build verified"

      - name: Verify committed assets match build output
        run: |
          # The committed assets/manifest.json + hashed files MUST match
          # what a fresh build produces — catches a developer who built
          # locally but forgot to commit the new assets.
          git diff --exit-code assets/manifest.json || {
            echo "::error::assets/manifest.json is out of date — run 'npm run build' and commit the result"
            exit 1
          }
          git diff --exit-code assets/js/ assets/css/ || {
            echo "::error::assets/js or assets/css is out of date — run 'npm run build' and commit the result"
            exit 1
          }

      - name: Verify .pot file is up to date
        run: |
          npm run make-pot
          git diff --exit-code languages/oxpulse-imager.pot || {
            echo "::error::languages/oxpulse-imager.pot is out of date — run 'npm run make-pot' and commit the result"
            exit 1
          }

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1.1.7
        with:
          build-dir: '.'
          exclude-files: |
            .gitignore
            .gitattributes
            .editorconfig
            .release-please-manifest.json
            release-please-config.json
            phpunit.xml.dist
            .phpunit.result.cache
            ROADMAP.md
            CHANGELOG.md
            SECURITY.md
            README.md
          exclude-directories: |
            node_modules
            vendor
            tests
            build
            .github
            .git
          # Legitimate false positives (reviewed):
          # - curl_* : WordPressPrewarmClient uses curl_multi for bounded
          #   concurrency (wp_remote_* is single-request; a 50-URL batch
          #   would take minutes sequentially). HTTP API has no multi primitive.
          # - ExceptionNotEscaped : exception messages are not HTML output.
          # - parse_url_parse_url : Domain/Application layer (UrlRewriter,
          #   HealthCheckService) intentionally uses PHP primitives, not WP
          #   wrappers — this layer must be WordPress-agnostic for testability.
          ignore-codes: |
            WordPress.WP.AlternativeFunctions.curl_curl_init
            WordPress.WP.AlternativeFunctions.curl_curl_setopt
            WordPress.WP.AlternativeFunctions.curl_curl_multi_init
            WordPress.WP.AlternativeFunctions.curl_curl_multi_add_handle
            WordPress.WP.AlternativeFunctions.curl_curl_multi_exec
            WordPress.WP.AlternativeFunctions.curl_curl_multi_select
            WordPress.WP.AlternativeFunctions.curl_curl_multi_info_read
            WordPress.WP.AlternativeFunctions.curl_curl_getinfo
            WordPress.WP.AlternativeFunctions.curl_curl_error
            WordPress.WP.AlternativeFunctions.curl_curl_multi_remove_handle
            WordPress.WP.AlternativeFunctions.curl_curl_multi_close
            WordPress.Security.EscapeOutput.ExceptionNotEscaped
            WordPress.WP.AlternativeFunctions.parse_url_parse_url
          ignore-warnings: false
